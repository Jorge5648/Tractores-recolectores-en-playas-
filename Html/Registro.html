<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro</title>

<style>

/* 🔥 CENTRAR TODO */
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eef3f8;
font-family: Arial;
}

/* FORM */
.form {
display: flex;
flex-direction: column;
gap: 10px;
background-color: #ffffff;
padding: 30px;
width: 400px;
border-radius: 20px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* INPUTS */
.flex-column > label {
font-weight: 600;
}

.inputForm {
border: 1.5px solid #ecedec;
border-radius: 10px;
height: 50px;
display: flex;
align-items: center;
padding-left: 10px;
transition: 0.2s;
}

.input {
margin-left: 10px;
border: none;
width: 85%;
height: 100%;
}

.input:focus {
outline: none;
}

.inputForm:focus-within {
border: 1.5px solid #2d79f3;
}

/* FILAS */
.flex-row {
display: flex;
justify-content: space-between;
align-items: center;
font-size:14px;
}

.span {
color: #2d79f3;
cursor: pointer;
}

/* BOTÓN PRINCIPAL */
.button-submit {
margin-top: 20px;
background:linear-gradient(135deg,#1a6cbe,#3498db);
border: none;
color: white;
font-size: 15px;
border-radius: 10px;
height: 50px;
cursor: pointer;
transition:0.3s;
}

.button-submit:hover {
transform:scale(1.03);
}

/* BOTONES EXTRA */
.btn {
margin-top: 10px;
height: 45px;
border-radius: 10px;
display: flex;
justify-content: center;
align-items: center;
gap: 10px;
border: 1px solid #ededef;
background-color: white;
cursor: pointer;
transition: 0.2s;
}

.btn:hover {
border: 1px solid #2d79f3;
}

/* TEXTO */
.p {
text-align: center;
font-size: 14px;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#1a6cbe;
}

</style>
</head>

<body>

<form class="form" onsubmit="return iniciarSesion(event)">

<div class="flex-column">
<label>Email</label>
</div>

<div class="inputForm">
<input type="email" name="email" class="input" placeholder="Ingresa tu correo" required>
</div>

<div class="flex-column">
<label>Contraseña</label>
</div>

<div class="inputForm">
<input type="password" name="password" class="input" placeholder="Ingresa tu contraseña" required>
</div>

<div class="flex-row">
<div>
<input type="checkbox"> Recordarme
</div>
<span class="span">¿Olvidaste tu contraseña?</span>
</div>

<button class="button-submit">Iniciar sesión</button>

<p class="p">¿No tienes cuenta? <span class="span">Regístrate</span></p>

<p class="p">O continúa con</p>

<button type="button" class="btn">Google</button>
<button type="button" class="btn">Apple</button>

</form>

<a href="index.html">← Volver a la página principal</a>

<script>

/* 🔥 FUNCIÓN DE LOGIN */
function iniciarSesion(e){
e.preventDefault();

let email = document.querySelector('input[name="email"]').value;
let password = document.querySelector('input[name="password"]').value;

if(email === "" || password === ""){
alert("Por favor llena todos los campos");
return false;
}

/* SIMULACIÓN */
alert("Inicio de sesión exitoso 🚀");

return false;
}

</script>

</body>
</html>
